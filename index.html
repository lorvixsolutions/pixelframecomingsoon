<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <!-- Preload animation JSON -->
  <link rel="preload" href="/assets/gif.json" as="fetch" crossorigin="anonymous">

  <!-- Lightweight Lottie -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      text-align: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 120px;
      margin-bottom: 16px;
    }

    #lottie {
      width: 100%;
      height: 240px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 700;
      color: #111827;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* Smooth fade-in */
    .fade-in {
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="container fade-in">

    <!-- LOGO -->
    <img src="/assets/logo.png" class="logo" alt="Pixel Frames Logo">

    <!-- LOTTIE CONTAINER -->
    <div id="lottie"></div>

    <!-- HEADING -->
    <h2>Coming Soon</h2>

    <!-- FOOTER -->
    <div class="footer">
      © 2026 Pixel Frames. All rights reserved.
    </div>

  </div>

  <script>
    // Load Lottie instantly
    lottie.loadAnimation({
      container: document.getElementById("lottie"),
      renderer: "svg",
      loop: true,
      autoplay: true,
      path: "/assets/gif.json"
    });
  </script>

</body>
</html>
