<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 120px;
      margin-bottom: 16px;
    }

    .animation {
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-top: 20px;
      color: #111;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }

    @media (min-width: 768px) {
      .container {
        max-width: 600px;
      }

      .animation {
        max-width: 400px;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- FIXED LOGO PATH -->
    <img src="/assets/logo.png" class="logo" alt="">

    <!-- LOTTIE (Make sure file exists) -->
    <lottie-player
      src="/assets/gif.json"
      class="animation"
      background="transparent"
      speed="1"
      loop
      autoplay>
    </lottie-player>

    <h2>Coming Soon</h2>

    <div class="footer">
      © 2026 Pixel Frames. All rights reserved.
    </div>

  </div>

</body>
</html>
