<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <!-- Preload animation -->
  <link rel="preload" href="/assets/gif.json" as="fetch" crossorigin="anonymous">

  <!-- Lottie (fast render) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      text-align: center;
      padding: 20px;
      color: #111827;
    }

    .container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    /* 🔥 BIG RESPONSIVE LOGO */
    .logo {
      width: clamp(180px, 50vw, 360px);
      margin-bottom: 24px;
    }

    /* 🎬 Animation */
    #lottie {
      width: 100%;
      max-width: 450px;
      height: clamp(200px, 35vh, 320px);
    }

    /* 🔥 MAIN TEXT */
    h2 {
      margin-top: 20px;
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #9ca3af;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 📱 Small screen tweaks */
    @media (max-width: 480px) {
      .logo {
        width: 65vw;
      }

      #lottie {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ✅ LOGO -->
    <img src="/assets/Logo.jpeg" class="logo" alt="Pixel Frames Logo">

    <!-- ✅ LOTTIE -->
    <div id="lottie"></div>

    <!-- ✅ HEADING -->
    <h2>Coming Soon</h2>

    <!-- ✅ FOOTER -->
    <div class="footer">
      © 2026 Pixel Frames. All rights reserved.
    </div>

  </div>

  <script>
    lottie.loadAnimation({
      container: document.getElementById("lottie"),
      renderer: "svg",
      loop: true,
      autoplay: true,
      path: "/assets/gif.json"
    });
  </script>

</body>
</html>
