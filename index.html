<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Coming Soon</title>

  <!-- Faster asset loading -->
  <link rel="preload" href="/assets/Logo.jpeg" as="image" fetchpriority="high">
  <link rel="preload" href="/assets/gif.json" as="fetch" crossorigin="anonymous">

  <!-- Faster than lottie-player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
      color: #111827;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: clamp(190px, 58vw, 360px);
      max-width: 92%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    #lottie {
      width: 100%;
      max-width: 420px;
      height: clamp(190px, 32vh, 290px);
    }

    h2 {
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #111827;
    }

    .footer {
      margin-top: 6px;
      font-size: clamp(12px, 3.4vw, 14px);
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .container {
        gap: 10px;
      }

      .logo {
        width: 72vw;
      }

      #lottie {
        height: 210px;
      }
    }

    @media (max-height: 680px) {
      #lottie {
        height: 180px;
      }

      .logo {
        width: clamp(170px, 48vw, 300px);
      }

      h2 {
        font-size: clamp(30px, 7vw, 48px);
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <img
      src="/assets/Logo.jpeg"
      class="logo"
      alt="Pixel Frames Logo"
      width="360"
      height="180"
      loading="eager"
      decoding="sync"
      fetchpriority="high"
    />

    <div id="lottie"></div>

    <h2>Coming Soon</h2>

    <div class="footer">
      © 2026 Pixel Frames. All rights reserved.
    </div>

  </main>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      lottie.loadAnimation({
        container: document.getElementById("lottie"),
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: "/assets/gif.json",
        rendererSettings: {
          progressiveLoad: true
        }
      });
    });
  </script>
</body>
</html>
