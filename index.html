<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>

    .logo {
      width: 150px;
      max-width: 70%;
      margin-bottom: 20px;
    }

    lottie-player {
      width: 320px;
      max-width: 100%;
      margin: 0 auto 10px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      margin-bottom: 14px;
      color: #111827;
    }

    p {
      font-size: 18px;
      color: #6b7280;
      max-width: 560px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      color: #9ca3af;
    }

    @media (max-width: 600px) {
      .container {
        padding: 32px 18px;
      }

      .logo {
        width: 120px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <img src="assets/logo.png" alt="Company Logo" class="logo" />

    <lottie-player
      src="assets/gif.json"
      background="transparent"
      speed="1"
      loop
      autoplay>
    </lottie-player>

    <h1>Coming Soon</h1>

    <div class="footer">
      © 2026 Pixel Frames. All rights reserved.
    </div>
  </main>
</body>
</html>
